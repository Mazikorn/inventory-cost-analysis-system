    <script type="text/javascript">
      // Vercel SPA fallback for client-side routing
      (function () {
        var redirect = sessionStorage.getItem('vercel-spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('vercel-spa-redirect');
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
