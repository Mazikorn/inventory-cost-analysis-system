<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入库登记 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="inbound-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container modal-lg" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">入库登记</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">物料名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="搜索或选择物料">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">批次号 <span class="required">*</span></label>
                        <input type="text" class="form-input mono-text" placeholder="如: LOT-2024-0001">
                    </div>
                    <div class="form-group">
                        <label class="form-label">入库数量 <span class="required">*</span></label>
                        <div class="number-stepper">
                            <button class="stepper-btn" onclick="decrement(this)">−</button>
                            <input type="number" class="stepper-input" value="1" min="1">
                            <button class="stepper-btn" onclick="increment(this)">+</button>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">生产日期</label>
                        <input type="date" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">有效期至 <span class="required">*</span></label>
                        <input type="date" class="form-input">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">供应商</label>
                        <input type="text" class="form-input" placeholder="输入供应商名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">入库单价 (¥)</label>
                        <input type="number" class="form-input" placeholder="0.00" step="0.01">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">备注</label>
                        <textarea class="form-textarea" rows="3" placeholder="可选填"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">确认入库</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
