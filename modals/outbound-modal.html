<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出库领用 - COREONE v2.2</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body style="background: var(--bg-page); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
<div class="modal" id="outbound-modal" style="position: relative; opacity: 1; visibility: visible;">
    <div class="modal-container modal-lg" style="position: relative; transform: none;">
        <div class="modal-header">
            <h3 class="modal-title">出库领用</h3>
            <button class="modal-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-section">
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">出库类型 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="outbound-type" value="project" checked>
                                <span>项目领用</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="outbound-type" value="daily">
                                <span>日常消耗</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="outbound-type" value="scrap">
                                <span>报废出库</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">关联项目</label>
                        <select class="form-select">
                            <option value="">请选择项目</option>
                            <option value="PRJ-001">全外显子组测序</option>
                            <option value="PRJ-002">肿瘤基因突变检测</option>
                            <option value="PRJ-003">病毒载量检测</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">物料清单 <span class="required">*</span></label>
                        <div class="outbound-items">
                            <div class="outbound-item">
                                <select class="form-select">
                                    <option>选择物料</option>
                                    <option>DNA提取试剂盒 v2.0</option>
                                    <option>PCR Master Mix</option>
                                </select>
                                <div class="number-stepper">
                                    <button class="stepper-btn" onclick="decrement(this)">−</button>
                                    <input type="number" class="stepper-input" value="1" min="1">
                                    <button class="stepper-btn" onclick="increment(this)">+</button>
                                </div>
                                <button class="btn btn-ghost btn-sm">删除</button>
                            </div>
                        </div>
                        <button class="btn btn-ghost btn-sm" style="margin-top: 8px;">+ 添加物料</button>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group form-group-lg">
                        <label class="form-label">领用备注</label>
                        <textarea class="form-textarea" rows="2" placeholder="可选填"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary">取消</button>
            <button class="btn btn-primary">确认出库</button>
        </div>
    </div>
</div>
<script src="../shared/scripts.js"></script>
</body>
</html>
